apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: envoy-proxy-monitor
  namespace: default
  labels:
    release: kube-prometheus-stack 
spec:
  namespaceSelector:
    matchNames:
    - envoy-gateway-system
  selector:
    matchLabels:
      app.kubernetes.io/component: proxy
  podMetricsEndpoints:
  - path: /stats/prometheus
    port: metrics
    interval: 15s