apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: go-web-app-nginx
  namespace: default
spec:
  interval: 1m
  chart:
    spec:
      chart: ./apps/go-web-app-nginx
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system