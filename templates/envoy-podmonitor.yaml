apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: envoy-proxy-monitor
  namespace: default
  labels:
    release: kube-prometheus-stack 
spec:
  namespaceSelector:
    any: true
  selector:
    matchLabels:
      app.kubernetes.io/component: proxy
  podMetricsEndpoints:
  - path: /stats/prometheus
    port: metrics-port
    targetPort: 19001
    interval: 15s